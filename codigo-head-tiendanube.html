<!--
  PEGAR EN TIENDANUBE:
  Panel admin > Personalizar mi tienda > Avanzado > Códigos externos
  > Código JavaScript adicional (head)

  Esto:
    1) Desactiva el zoom (pinch + doble tap) en mobile
    2) Elimina del DOM la sección nativa "Opiniones de clientes" (con sus reseñas demo)
    3) Oculta los labels "0% OFF" cuando no hay descuento real
    4) Reemplaza "HASTA X% OFFCOMPRANDO EN CANTIDAD" por "HASTA X% OFF"
-->

<script>
(function(){
  function setViewport(){
    var meta = document.querySelector('meta[name="viewport"]');
    if (!meta) { meta = document.createElement('meta'); meta.setAttribute('name','viewport'); document.head.appendChild(meta); }
    meta.setAttribute('content','width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover');
  }
  setViewport();

  document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, {passive:false});
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, {passive:false});
  document.addEventListener('gestureend', function(e){ e.preventDefault(); }, {passive:false});

  var lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    var now = Date.now();
    if (now - lastTouchEnd < 350) { e.preventDefault(); }
    lastTouchEnd = now;
  }, {passive:false});

  function isOurs(el){
    return el && (el.closest && (el.closest('#selka-reviews-section') || el.closest('#selka-rev-modal') || el.closest('#selka-reviews-all-modal') || el.closest('.sk-product')));
  }
  function nukeAncestor(el){
    if (!el || isOurs(el)) return false;
    var p = el;
    for (var i=0; i<8 && p && p !== document.body && p !== document.documentElement; i++) {
      var parent = p.parentElement;
      if (!parent) break;
      var c = (p.className || '') + ' ' + (p.id || '');
      if (/review|comment|opinion|disqus|kudos|judge|stamped|loox|product-comments|product-reviews/i.test(c)) {
        if (!isOurs(p)) { try { p.remove(); } catch(e) { p.style.cssText = 'display:none !important'; } return true; }
      }
      if (p.tagName === 'SECTION' && !isOurs(p)) {
        try { p.remove(); } catch(e) { p.style.cssText = 'display:none !important'; } return true;
      }
      p = parent;
    }
    var fallback = el;
    for (var k=0; k<4 && fallback && fallback.parentElement; k++) fallback = fallback.parentElement;
    if (fallback && !isOurs(fallback) && fallback !== document.body) {
      try { fallback.remove(); } catch(e) { fallback.style.cssText = 'display:none !important'; }
      return true;
    }
    return false;
  }
  function removeNativeReviews(){
    var headings = document.querySelectorAll('h1, h2, h3, h4, h5, h6');
    for (var i=0;i<headings.length;i++){
      var h = headings[i];
      if (isOurs(h)) continue;
      var t = (h.textContent || '').trim().toLowerCase();
      if (t.indexOf('opiniones de clientes') === -1 && t.indexOf('opiniones de la tienda') === -1 && t.indexOf('opiniones del producto') === -1) continue;
      nukeAncestor(h);
    }
    var btns = document.querySelectorAll('a, button');
    for (var j=0;j<btns.length;j++){
      var b = btns[j];
      if (isOurs(b)) continue;
      var tt = (b.textContent || '').trim().toLowerCase();
      if (tt === 'escribir opinión' || tt === 'escribir opinion' || tt === 'escribir reseña' || tt === 'escribir resena') {
        nukeAncestor(b);
      }
    }
    var specific = document.querySelectorAll(
      '.section-product-comments, [data-store="product-comments"], [data-store="product-reviews"], ' +
      '[data-store="product-reviews-container"], .product-reviews-section, .product-reviews-container, ' +
      '.js-product-comments, .js-product-reviews, .js-product-reviews-container, .js-reviews-container, ' +
      '#product_comments, #product-comments, #product-reviews, .nube-product-reviews, ' +
      '.section-reviews, [class*="opiniones"], [id*="opiniones"]'
    );
    specific.forEach(function(el){
      if (isOurs(el)) return;
      try { el.remove(); } catch(e) { el.style.cssText = 'display:none !important;visibility:hidden !important;height:0 !important;overflow:hidden !important'; }
    });
  }

  function cleanLabels(){
    var labels = document.querySelectorAll('.item-floating-elements .label, .item-floating-elements .js-offer-label, .item-floating-elements .js-offer-label-private, .item-floating-elements .js-promo-label, .item-floating-elements [class*="offer-label"]');
    labels.forEach(function(lbl){
      var txt = (lbl.textContent || '').trim().toUpperCase();
      if (/(^|\b)0\s*%\s*OFF($|\b)/.test(txt) && !/[1-9]\d*\s*%/.test(txt)) {
        lbl.style.display = 'none';
        return;
      }
      var m = txt.match(/HASTA\s*(\d+)\s*%\s*OFF\s*COMPRANDO\s*(EN\s*CANTIDAD|MULTIPLE|MAS)?/);
      if (m) {
        lbl.innerHTML = '';
        var span = document.createElement('span');
        span.textContent = 'HASTA ' + m[1] + '% OFF';
        span.style.cssText = 'font-weight:700;letter-spacing:1px;white-space:nowrap;';
        lbl.appendChild(span);
      }
    });
  }

  function run(){ removeNativeReviews(); cleanLabels(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
  window.addEventListener('load', run);
  setTimeout(run, 300);
  setTimeout(run, 1000);
  setTimeout(run, 2500);
  setTimeout(run, 5000);
  try {
    var mo = new MutationObserver(function(){ run(); });
    mo.observe(document.body, { childList:true, subtree:true });
  } catch(e){}
})();
</script>
